services:
  redis:
    image: redis:7-alpine
    container_name: meetingbot-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  transcription:
    build:
      context: .
      dockerfile: apps/transcription/Dockerfile
    container_name: meetingbot-transcription
    environment:
      PORT: 6666
      HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      - redis
    ports:
      - "6666:6666"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: meetingbot-backend
    environment:
      PORT: 3000
      HOST: 0.0.0.0
      REDIS_URL: redis://redis:6379
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
    depends_on:
      - redis
      - transcription
    ports:
      - "3000:3000"
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: meetingbot-worker
    environment:
      REDIS_URL: redis://redis:6379
      BACKEND_INTERNAL_URL: http://backend:3000/internal
      INTERNAL_API_TOKEN: ${INTERNAL_API_TOKEN:-}
      BOT_IMAGE: meetingbot-bot:latest
      BOT_DOCKERFILE: /app/apps/bot/Dockerfile
      BOT_BUILD_CONTEXT: /app
      BOT_IMAGE_ALWAYS_BUILD: "true"
      DOCKER_NETWORK: meetingbot
      TRANSCRIPTION_WS_URL: ws://transcription:6666/ws
      BROWSER_EXECUTABLE_PATH: /usr/bin/google-chrome
      HEADLESS: "true"
      BOT_SCREENSHOT_VOLUME: meetingbot_debug-screenshots
      BOT_VIDEO_VOLUME: meetingbot_debug-videos
      DEBUG_SCREENSHOT_ROOT: /tmp/meetingbot/debug-screenshots
      DEBUG_VIDEO_ROOT: /tmp/meetingbot/debug-videos
    depends_on:
      - redis
      - backend
      - transcription
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  default:
    name: meetingbot

volumes:
  meetingbot_debug-screenshots:
  meetingbot_debug-videos:
